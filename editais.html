<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Editais</title>
    <script src="editais.js" defer></script>
    <link rel="stylesheet" href="editais.css">
</head>

<body>
    <main class="container">

        <!-- ESQUERDA (editais) -->
        <aside class="sidebar">

            <div class="topo-sidebar">

                <h2>Editais</h2>

                <button onclick="abrirModalNovo()">
                    + Novo Edital
                </button>
                <button onclick="voltarMenu()">
                    ◀️ Voltar
                </button>
                
            </div>

            <div id="listaEditais"></div>

        </aside>

        <!-- DIREITA (conteudo) -->
        <section class="conteudo">

            <div class="card-detalhes">

                <div class="cabecalho">

                    <div>

                        <h1 id="tituloEdital"></h1>

                        <span id="statusEdital"></span>

                    </div>

                    <div class="acoes">

                        <button onclick="abrirModalEditar()">
                            Editar
                        </button>

                        <button onclick="excluirEdital()">
                            Excluir
                        </button>

                    </div>

                </div>

                <p id="descricaoEdital"></p>

            </div>

            <div class="card" id="cardDocumento">

                <h3>Documento</h3>

                <a id="linkDocumento" target="_blank">
                    Visualizar Documento
                </a>

            </div>

            <div class="card" id="cardCronograma">

                <h3>Cronograma</h3>

                <ul>

                    <li>
                        Início:
                        <span id="inicioInscricao"></span>
                    </li>

                    <li>
                        Fim:
                        <span id="fimInscricao"></span>
                    </li>

                    <li>
                        Resultado Preliminar:
                        <span id="resultadoPreliminar"></span>
                    </li>

                    <li>
                        Resultado Final:
                        <span id="resultadoFinal"></span>
                    </li>

                </ul>

            </div>

        </section>

    </main>
    <!--Sendo sincero eu nem sabia o que era um modal, eu não sabia como fazer esse negócio e a IA recomendou isso-->
    <div id="modalEdital" class="modal oculto">

        <div class="modal-content">

            <div class="modal-header">
                <h2 id="tituloModal">Cadastrar Edital</h2>

                <button class="btn-fechar" type="button" class="btn-fechar" onclick="fecharModal()">
                    ✕
                </button>
            </div>

            <form id="formEdital">

                <div class="campo">
                    <label>Nome *</label>
                    <input type="text" id="nome" required>
                </div>

                <div class="campo">
                    <label>Descrição *</label>
                    <textarea id="descricao" required></textarea>
                </div>

                <div class="campo">
                    <label>URL do Documento *</label>
                    <input type="url" id="urlDocumento" placeholder="https://..." required>
                </div>

                <div class="campo">
                    <label>Link de Download *</label>
                    <input type="url" id="linkDownload" placeholder="https://..." required>
                </div>

                <div class="linha">

                    <div class="campo">
                        <label>Início das Inscrições *</label>
                        <input type="date" id="inicioInscricaoInput" required>
                    </div>

                    <div class="campo">
                        <label>Término das Inscrições *</label>
                        <input type="date" id="fimInscricaoInput" required>
                    </div>

                </div>

                <div class="campo checkbox">
                    <label>
                        <input type="checkbox" id="aceitaDocumentos">
                        Aceita submissão de documentos de projeto
                    </label>
                </div>

                <hr>

                <h3>Cronograma</h3>

                <div class="campo">
                    <label>Resultado Preliminar</label>
                    <input type="date" id="resultadoPreliminarInput">
                </div>

                <div class="linha">

                    <div class="campo">
                        <label>Período para Recurso - Início</label>
                        <input type="date" id="recursoInicioInput">
                    </div>

                    <div class="campo">
                        <label>Período para Recurso - Fim</label>
                        <input type="date" id="recursoFimInput">
                    </div>

                </div>

                <div class="campo">
                    <label>Resultado Final</label>
                    <input type="date" id="resultadoFinalInput">
                </div>

                <div class="campo">
                    <label>Status *</label>

                    <select id="status" required>
                        <option value="ABERTO">Aberto</option>
                        <option value="EM_ANALISE">Em análise</option>
                        <option value="FINALIZADO">Finalizado</option>
                    </select>
                </div>

                <div class="acoes">

                    <button type="button" class="cancelar" type="button" class="cancelar" onclick="fecharModal()">
                        Cancelar
                    </button>

                    <button type="submit" class="salvar">
                        Salvar Edital
                    </button>

                </div>

            </form>

        </div>

    </div>
</body>

</html>
